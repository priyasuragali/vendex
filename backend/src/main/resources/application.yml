spring:
  application:
    name: vendex-backend
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5432/vendex
    username: vendex
    password: vendex123
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secret: your-super-secret-key-change-in-production
  expiration: 86400000

logging:
  level:
    root: INFO
    com.vendex: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
